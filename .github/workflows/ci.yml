name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --run --project=unit --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-min-32-characters-long' }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./dev.db
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_PUBLISHABLE_KEY: pk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci

      - name: Build Storybook
        run: npm run build-storybook

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-min-32-characters-long' }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./dev.db
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_PUBLISHABLE_KEY: pk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-min-32-characters-long' }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./dev.db
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_PUBLISHABLE_KEY: pk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
